name: Keep Maya Warm
on:
  schedule:
    # Run every 5 minutes to prevent Autoscale sleep
    - cron: "*/5 * * * *"
  workflow_dispatch:  # Allow manual triggering

jobs:
  ping-warmup:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /warmup endpoint
        run: |
          echo "Pinging Maya warmup endpoint..."
          # Replace YOUR_REPLIT_URL with your actual deployed URL
          # Example: https://maya-yourusername.replit.app/warmup
          WARMUP_URL="${{ secrets.MAYA_WARMUP_URL || 'https://YOUR_REPLIT_URL/warmup' }}"
          
          curl -sS --max-time 10 "$WARMUP_URL" || {
            echo "Warning: Warmup ping failed (this is okay if app is cold starting)"
            exit 0
          }
          
          echo "✅ Warmup successful"
      
      - name: Ping /health endpoint
        run: |
          echo "Checking health endpoint..."
          HEALTH_URL="${{ secrets.MAYA_WARMUP_URL || 'https://YOUR_REPLIT_URL/warmup' }}"
          HEALTH_URL="${HEALTH_URL/warmup/health}"
          
          curl -sS --max-time 5 "$HEALTH_URL" || true
