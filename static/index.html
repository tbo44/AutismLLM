<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maya - UK Autism Facts Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css?v=4">
</head>
<body>
    <div class="app-container">
        <!-- Simple Header -->
        <div class="header">
            <div class="app-title">MAYA</div>
            <button id="lowStimToggle" class="mode-toggle active">
                LOW-STIMULATION MODE
            </button>
        </div>
        
        <!-- Chat Messages -->
        <div class="chat-area" id="chatArea">
            <!-- Messages will be inserted here -->
        </div>
        
        <!-- Suggested Actions -->
        <div class="suggestions" id="suggestions">
            <button class="suggestion-btn" data-action="tell-joke">Tell me a joke</button>
            <button class="suggestion-btn" data-action="support-services">What support is available?</button>
            <button class="suggestion-btn" data-action="benefits">Help with benefits</button>
        </div>
        
        <!-- Message Input -->
        <div class="input-area">
            <div class="input-container">
                <input type="text" id="messageInput" placeholder="Message" autocomplete="off">
                <button id="sendButton" type="button" aria-label="Send message">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 2L11 13"/>
                        <path d="M22 2L15 22L11 13L2 9L22 2Z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>
    
    <script src="/static/script.js"></script>
</body>
</html>
